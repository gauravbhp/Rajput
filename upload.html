<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon DB Upload - राजपूत ठाकुर</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fdf4e3 0%, #f5e6d3 100%);
        }
        .upload-zone {
            border: 2px dashed #b8860b;
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: #ff9933;
            background: rgba(255, 153, 51, 0.05);
        }
    </style>
</head>
<body class="min-h-screen">

<!-- Navigation -->
<nav class="bg-gradient-to-r from-amber-900 to-amber-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-3">
        <div class="flex justify-between items-center">
            <a href="index.html" class="text-white text-2xl font-bold">
                ⚔️ राजपूत ठाकुर
            </a>
            <div class="space-x-4">
                <a href="index.html" class="text-amber-200 hover:text-white">गैलरी</a>
                <a href="upload.html" class="text-white font-semibold">अपलोड</a>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="max-w-3xl mx-auto px-4 py-12">
    
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-amber-900 mb-2">Neon DB में अपलोड करें</h1>
        <p class="text-amber-600 mb-6">आपकी तस्वीरें PostgreSQL database में save होंगी</p>
        
        <!-- Upload Form -->
        <div id="uploadSection" class="space-y-6">
            
            <!-- Image Title -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">तस्वीर का नाम *</label>
                <input type="text" id="imageTitle" required
                    class="w-full px-4 py-3 border rounded-lg focus:border-amber-500 outline-none"
                    placeholder="e.g., महाराणा प्रताप, आमेर किला">
            </div>
            
            <!-- Description -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">विवरण (वैकल्पिक)</label>
                <textarea id="imageDescription" rows="3"
                    class="w-full px-4 py-3 border rounded-lg focus:border-amber-500 outline-none"
                    placeholder="इस तस्वीर के बारे में बताएं..."></textarea>
            </div>
            
            <!-- File Upload -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">तस्वीर चुनें *</label>
                <div class="upload-zone rounded-lg p-8 text-center" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('fileInput').click()"
                        class="bg-amber-600 text-white px-6 py-3 rounded-lg hover:bg-amber-700">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>Image Select करें
                    </button>
                    <p id="selectedFile" class="mt-2 text-gray-500 text-sm">कोई फाइल चुनी नहीं</p>
                </div>
            </div>
            
            <!-- Preview -->
            <div id="preview" class="hidden">
                <img id="previewImage" class="max-h-64 mx-auto rounded-lg shadow-lg">
            </div>
            
            <!-- Upload Button -->
            <button id="uploadBtn" onclick="uploadToNeonDB()" disabled
                class="w-full bg-gradient-to-r from-amber-700 to-amber-600 text-white py-4 rounded-xl font-bold text-lg disabled:opacity-50">
                <i class="fas fa-database mr-2"></i>Neon DB में अपलोड करें
            </button>
            
            <!-- Progress Bar -->
            <div id="progress" class="hidden">
                <div class="flex justify-between mb-1">
                    <span class="text-sm font-medium text-amber-700">Uploading...</span>
                    <span id="progressPercent" class="text-sm font-medium text-amber-700">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-amber-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Status Message -->
            <div id="statusMessage" class="hidden p-4 rounded-lg"></div>
        </div>
    </div>
</main>

<script>
// DOM Elements
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
let selectedFile = null;

// Drag and drop handlers
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('border-amber-600', 'bg-amber-50');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('border-amber-600', 'bg-amber-50');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-amber-600', 'bg-amber-50');
    const file = e.dataTransfer.files[0];
    handleFileSelect(file);
});

// File input change
fileInput.addEventListener('change', (e) => {
    handleFileSelect(e.target.files[0]);
});

function handleFileSelect(file) {
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
        showStatus('कृपया केवल तस्वीर अपलोड करें', 'error');
        return;
    }
    
    // Validate file size (10MB max)
    if (file.size > 10 * 1024 * 1024) {
        showStatus('फाइल का साइज़ 10MB से कम होना चाहिए', 'error');
        return;
    }
    
    selectedFile = file;
    document.getElementById('selectedFile').textContent = `📁 ${file.name}`;
    document.getElementById('uploadBtn').disabled = false;
    
    // Show preview
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('previewImage').src = e.target.result;
        document.getElementById('preview').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
    
    showStatus('', '');
}

async function uploadToNeonDB() {
    const title = document.getElementById('imageTitle').value.trim();
    const description = document.getElementById('imageDescription').value.trim();
    
    if (!title) {
        showStatus('कृपया तस्वीर का नाम लिखें', 'error');
        return;
    }
    
    if (!selectedFile) {
        showStatus('कृपया तस्वीर चुनें', 'error');
        return;
    }
    
    // Show progress
    document.getElementById('progress').classList.remove('hidden');
    document.getElementById('uploadBtn').disabled = true;
    
    // Create form data
    const formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    formData.append('image', selectedFile);
    
    try {
        // Convert FormData to base64 for Netlify Function
        const buffer = await formDataToBase64(formData);
        
        const response = await fetch('/.netlify/functions/upload-image', {
            method: 'POST',
            headers: {
                'Content-Type': 'multipart/form-data; boundary=----WebKitFormBoundary' + Math.random().toString(36).substring(7)
            },
            body: buffer
        });
        
        // Simulate progress
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = progress + '%';
            
            if (progress >= 100) {
                clearInterval(interval);
            }
        }, 200);
        
        const data = await response.json();
        
        if (data.success) {
            setTimeout(() => {
                showStatus('✅ तस्वीर सफलतापूर्वक अपलोड हो गई!', 'success');
                
                // Reset form
                document.getElementById('imageTitle').value = '';
                document.getElementById('imageDescription').value = '';
                document.getElementById('fileInput').value = '';
                document.getElementById('selectedFile').textContent = 'कोई फाइल चुनी नहीं';
                document.getElementById('preview').classList.add('hidden');
                document.getElementById('progress').classList.add('hidden');
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressPercent').textContent = '0%';
                selectedFile = null;
                
                // Redirect to gallery after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }, 1000);
        } else {
            showStatus('❌ अपलोड नहीं हो सका: ' + data.error, 'error');
            document.getElementById('progress').classList.add('hidden');
            document.getElementById('uploadBtn').disabled = false;
        }
        
    } catch (error) {
        console.error('Upload error:', error);
        showStatus('❌ अपलोड नहीं हो सका: ' + error.message, 'error');
        document.getElementById('progress').classList.add('hidden');
        document.getElementById('uploadBtn').disabled = false;
    }
}

// Helper function to convert FormData to base64
async function formDataToBase64(formData) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(new Blob([formData]));
    });
}

function showStatus(message, type) {
    const statusDiv = document.getElementById('statusMessage');
    if (!message) {
        statusDiv.classList.add('hidden');
        return;
    }
    
    statusDiv.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'text-green-800', 'text-red-800');
    statusDiv.classList.add(type === 'success' ? 'bg-green-100' : 'bg-red-100');
    statusDiv.classList.add(type === 'success' ? 'text-green-800' : 'text-red-800');
    statusDiv.textContent = message;
}
</script>
</body>
</html>
